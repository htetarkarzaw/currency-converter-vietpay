name: currency_converter
description: Currency Converter — Vietpay Assessment
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # BLoC
  flutter_bloc: ^8.1.6
  bloc: ^8.1.4

  # Networking
  dio: ^5.7.0

  # Local Database
  drift: ^2.21.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.4
  path: ^1.9.0

  # DI
  get_it: ^8.0.2

  # Utils
  equatable: ^2.0.5
  intl: ^0.19.0
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # BLoC Testing
  bloc_test: ^9.1.7
  mocktail: ^1.0.4

  # Drift code generation
  drift_dev: ^2.21.0
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
